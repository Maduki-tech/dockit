# ── HTTP ──────────────────────────────────────────────────────────────────────
# Redirect all HTTP traffic to HTTPS once SSL is set up.
# Before you have a certificate, comment out the redirect and use the proxy
# block below directly on port 80 for initial testing.
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (keep this even after enabling HTTPS)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Uncomment after obtaining a certificate to force HTTPS:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Comment out this block once HTTPS is enabled:
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

