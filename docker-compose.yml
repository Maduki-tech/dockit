name: dockit

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dockit
      POSTGRES_USER:     dockit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U dockit"]
      interval: 5s
      timeout:  5s
      retries:  10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL:                      postgresql://dockit:${POSTGRES_PASSWORD}@postgres:5432/dockit
      CLERK_SECRET_KEY:                  ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      UPLOADTHING_TOKEN:                 ${UPLOADTHING_TOKEN:-}
      LANDING_ONLY:                      ${LANDING_ONLY:-false}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app

  # One-shot service to obtain/renew a Let's Encrypt certificate.
  # Run with: docker compose run --rm certbot
  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    profiles:
      - ssl
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL:?Set CERTBOT_EMAIL in .env}
      --agree-tos --no-eff-email
      -d ${DOMAIN:?Set DOMAIN in .env}

volumes:
  postgres_data:
  letsencrypt:
  certbot_webroot:
